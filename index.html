<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Board</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: #222;
        color: #fff;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      /* 상단 바 */
      .menu {
        display: flex;
        justify-content: flex-start;
        align-items: center;
        background-color: #222b36;
        padding: 0 20px;
        height: 60px;
        position: relative;
        z-index: 100;
      }
      .menu button {
        background: none;
        border: none;
        color: #8fa0a7;
        font-size: 0.95rem;
        padding: 0 15px;
        height: 100%;
        cursor: pointer;
        position: relative;
        transition: all 0.3s ease;
      }
      .menu button:hover {
        color: #fff;
      }
      .menu button.active::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 15px;
        right: 15px;
        height: 3px;
        background-color: #10b981;
        border-radius: 2px 2px 0 0;
      }
      .menu .bar {
        color: #8fa0a7;
        display: none;
        cursor: pointer;
      }

      /* 검색 */
      .search {
        margin-left: auto;
        display: flex;
        align-items: center;
        background-color: #1f2731;
        border: 1px solid #374151;
        border-radius: 30px;
        padding: 4px 6px 4px 16px;
        transition: all 0.3s ease;
      }
      .search:hover {
        border-color: #10b981;
        box-shadow: 0 0 8px rgba(16, 185, 129, 0.2);
      }
      #searchInput {
        background: none;
        border: none;
        outline: none;
        color: #fff;
        transition: all 0.3s ease;
      }
      #searchBtn {
        background-color: #10b981;
        border: none;
        border-radius: 50%;
        width: 32px;
        height: 32px;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        font-size: 0.9rem;
        transition: all 0.2s ease;
        color: #fff;
      }

      /* 메인 비주얼 영역 */
      #heroSection {
        width: 100%;
        height: 65vh;
        position: relative;
        background-size: cover;
        background-position: center 20%;
        background-repeat: no-repeat;
        display: flex;
        align-items: center;
        padding: 0 5%;
        transition: background-image 0.5s ease-in-out;
      }

      /* 시네마틱 어두운 그라데이션 오버레이 (글자 가독성 확보) */
      #heroSection::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background:
          linear-gradient(
            to right,
            rgba(34, 34, 34, 0.9) 20%,
            rgba(34, 34, 34, 0.4) 50%,
            rgba(34, 34, 34, 0.8) 100
          ),
          linear-gradient(
            to top,
            rgba(34, 34, 34, 1) 0%,
            rgba(34, 34, 34, 0) 30%
          );
        z-index: 1;
      }

      .hero-content {
        position: relative;
        z-index: 2;
        max-width: 600px;
      }

      #heroTitle {
        font-size: 3rem;
        font-weight: 800;
        margin-bottom: 15px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.6);
        word-break: keep-all;
      }

      #heroOverview {
        font-size: 1rem;
        line-height: 1.5;
        color: #e5e7eb;
        margin-bottom: 25px;
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.6);
        word-break: keep-all;
      }

      /* 프리미엄 버튼 스타일 */
      .hero-buttons {
        display: flex;
        gap: 15px;
      }

      .hero-buttons button {
        padding: 12px 28px;
        font-size: 0.95rem;
        font-weight: 600;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.25s ease;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .btn-play {
        background-color: #fff;
        color: #000;
        border: none;
      }

      .btn-play:hover {
        background-color: rgba(255, 255, 255, 0.85);
        transform: scale(1.03);
      }

      .btn-info {
        background-color: rgba(107, 114, 128, 0.4);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(4px);
      }

      .btn-info:hover {
        background-color: rgba(107, 114, 128, 0.6);
        transform: scale(1.03);
      }

      /* 무비보드 카드 리스트 영역 */
      #movieBoard {
        width: 90%;
        margin: 40px auto;
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 20px;
      }
      #movieBoard .card {
        width: calc((100% - 60px) / 4);
        text-align: center;
      }
      .imgBox {
        width: 100%;
        position: relative;
      }
      img {
        width: 100%;
        height: 500px;
        object-fit: cover;
        border-radius: 25px;
      }

      /* 영화 제목, 소개 */
      .infoBox {
        padding: 15px 5px;
        text-align: left;
      }
      h2 {
        font-size: 1.2rem;
        margin-bottom: 1rem;
      }
      .infoBox .overview {
        font-size: 0.85rem;
        line-height: 1.4;
        color: #eee;
        word-break: keep-all;
      }

      /* 평점 배지 */
      .imgBox .avg {
        position: absolute;
        top: 10px;
        left: 10px;
        background-color: rgba(0, 0, 0, 0.7);
        padding: 5px 8px;
        border-radius: 5px;
        font-size: 0.8rem;
        font-weight: bold;
        z-index: 10;
      }
      .imgBox .avg span {
        color: orange;
        font-size: 0.8rem;
        margin-right: 4px;
      }

      /* 더보기 버튼 */
      #more {
        display: block;
        margin: 40px auto 80px auto;
        padding: 12px 40px;
        background-color: #222b36;
        border: 1px solid #374151;
        border-radius: 8px;
        color: #8fa0a7;
        transition: all 0.3s ease;
      }
      #more:hover {
        background-color: #1f2731;
        border-color: #10b981;
        color: #fff;
      }

      /* 미디어 쿼리 반응형 */
      @media (max-width: 1024px) and (min-width: 501px) {
        #movieBoard .card {
          width: calc((100% - 40px) / 3);
        }
        .menu button {
          display: none;
        }
        .menu .bar {
          display: block;
        }
      }

      @media (max-width: 500px) {
        #movieBoard .card {
          width: calc((100% - 20px) / 2);
        }
        .menu button {
          display: none;
        }
        .menu .bar {
          display: block;
        }
        #heroTitle {
          font-size: 2rem;
        }
      }
    </style>
  </head>

  <body>
    <div class="menu">
      <i class="fa-solid fa-bars-staggered bar"></i>
      <button onclick="movie('now_playing')">현재상영영화</button>
      <button onclick="movie('popular')">인기영화</button>
      <button onclick="movie('top_rated')">추천영화</button>
      <button onclick="movie('upcoming')">상영예정영화</button>
      <div class="search">
        <input id="searchInput" placeholder="영화 제목을 입력하세요" />
        <button id="searchBtn">
          <i class="fa-solid fa-magnifying-glass"></i>
        </button>
      </div>
    </div>

    <div id="heroSection">
      <div class="hero-content">
        <h1 id="heroTitle">영화 제목</h1>
        <p id="heroOverview">영화 설명이 이 자리에 들어갑니다.</p>
        <div class="hero-buttons">
          <button class="btn-play">
            <i class="fa-solid fa-play"></i> 지금 시청하기
          </button>
          <button class="btn-info">
            <i class="fa-solid fa-circle-info"></i> 상세 정보
          </button>
        </div>
      </div>
    </div>

    <div id="movieBoard"></div>
    <button id="more">더보기</button>

    <script src="custom.js"></script>
  </body>
</html>
